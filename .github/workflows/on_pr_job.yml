name: on PR to main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "epic/*" ]

env:
  BUILD_TYPE: Debug
  CONTAINER_SRC_DIR: /usr/app/src
  CONTAINER_BIN_DIR: /usr/app/bin
  WORKSPACE_BIN_DIR: ${{github.workspace}}/bin

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: build dev image
      uses: docker/build-push-action@v3
      with:
        build-args: |
          UID=${{env.UID}}
          GID=${{env.GID}}
        tags: nanoipcdev:latest
        file: ${{github.workspace}}/docker/dev.dockerfile

    - name: cmake config
      working-directory: ${{github.workspace}}
      run: |
        mkdir -p ${{env.WORKSPACE_BIN_DIR}}
        docker run -i -v ${{github.workspace}}:${{env.CONTAINER_SRC_DIR}} -v ${{env.WORKSPACE_BIN_DIR}}:${{env.CONTAINER_BIN_DIR}} nanoipcdev:latest -c "cmake -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DNANOIPC_TESTS=ON -DNANOIPC_LINUX_FEATURES=ON -S ${{env.CONTAINER_SRC_DIR}} -B ${{env.CONTAINER_BIN_DIR}}"
    
    - name: build
      working-directory: ${{github.workspace}}
      run: |
        docker run -i -v ${{github.workspace}}:${{env.CONTAINER_SRC_DIR}} -v ${{env.WORKSPACE_BIN_DIR}}:${{env.CONTAINER_BIN_DIR}} nanoipcdev:latest -c "cmake --build ${{env.CONTAINER_BIN_DIR}}"

    - name: run uts
      working-directory: ${{github.workspace}}
      run: |
        docker run -i -v ${{github.workspace}}:${{env.CONTAINER_SRC_DIR}} -v ${{env.WORKSPACE_BIN_DIR}}:${{env.CONTAINER_BIN_DIR}} -w ${{env.CONTAINER_BIN_DIR}} nanoipcdev:latest -c "ctest --rerun-failed --output-on-failure"